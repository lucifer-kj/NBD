services:
  # --- Backend API (Django Ninja) ---
  - type: web
    name: naaz-backend
    runtime: docker
    plan: free
    dockerContext: naaz-backend
    dockerfilePath: naaz-backend/Dockerfile
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: naaz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: naaz-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: naaz-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://nbd-tan.vercel.app

  # --- Redis Instance (Managed Key Value) ---
  - type: keyvalue
    name: naaz-redis
    plan: free

databases:
  # --- PostgreSQL Database ---
  - name: naaz_db_prod # Renamed for clarity
    plan: free
